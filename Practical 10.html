<!DOCTYPE html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8"> 
    <title>Iframe Practical</title> 
    <style> 
        body { 
            font-family: Arial; 
            text-align: center; 
            background: #f4f4f4; 
        } 
 
        h1 { 
            background: #333; 
            color: white; 
            padding: 10px; 
        } 
 
        iframe { 
            border: 2px solid black; 
            margin: 20px; 
        } 
    </style> 
  
</head> 
<body> 
 
<h1>HTML Iframe Demo</h1> 
 
<h2>1. Embedding External Website</h2> 
<iframe src="https://www.wikipedia.org"  
        width="80%"  
        height="300"  
        title="Wikipedia Page"> 
</iframe> 
 
<h2>2. Embedding YouTube Video</h2> 
<iframe width="560"  
        height="315"  
        src="https://www.youtube.com/embed/tgbNymZ7vqY"  
        title="YouTube video" 
        allowfullscreen> 
</iframe> 
 
<h2>3. Embedding Google Map</h2> 
<iframe  
    src="https://www.google.com/maps?q=Nagpur&output=embed" 
    width="80%"  
    height="300" 
    loading="lazy" 
    title="Google Map"> 
</iframe> 
 
</body> 
</html>
